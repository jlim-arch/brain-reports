<!doctype html>
<!--
  REPORT TEMPLATE — the brain copies this to reports/<slug>.html and fills it.
  Rules for a consistent ad-dashboard-fluid look:
    - Do NOT add styles or frameworks. Only use classes from /styles.css.
    - Keep the hero → sections structure. Every section is <section class="section">.
    - Blocks available: .card, .grid2, .grid3, .callout, .prose, .table-wrap>table, .chip.
    - Prose goes inside .prose. Tables inside .table-wrap. Never inline colors.
    - eyebrow = short kicker (e.g. "RESEARCH · CUSTODY"). meta = date + source line.
    - Always end with the footer exactly as given.
  Placeholders: {{TITLE}} {{EYEBROW}} {{SUB}} {{META}} {{CHIPS}} {{BODY}}
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{TITLE}} · brain reports</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <header class="hero">
    <div class="eyebrow">{{EYEBROW}}</div>
    <h1>{{TITLE}}</h1>
    <p class="sub">{{SUB}}</p>
    <div class="chips">{{CHIPS}}</div>
    <div class="meta">{{META}}</div>
  </header>

  <main>
    {{BODY}}

    <footer>fluid edition · /blockstream dashboards · generated by brain</footer>
  </main>
</body>
</html>
